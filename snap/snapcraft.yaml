name: redline
base: core22
version: '0.1.2'
title: Redline
summary: A high-performance, lightweight image annotation & redlining tool.
description: |
  Redline is a native, ultra-lightweight desktop image annotation utility
  designed for designers, developers, and QA reviewers to mark up screenshots,
  draw dimensions, add highlights, and edit text shapes.
grade: stable
confinement: strict
license: MIT
contact: https://github.com/jarrodek/redline/issues
issues: https://github.com/jarrodek/redline/issues
source-code: https://github.com/jarrodek/redline
website: https://github.com/jarrodek/redline

architectures:
  - build-on: [amd64]
    build-for: [amd64]
  - build-on: [arm64]
    build-for: [arm64]

layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1

apps:
  redline:
    command: usr/bin/redline
    desktop: usr/share/applications/Redline.desktop
    extensions: [gnome]

parts:
  build-app:
    plugin: dump
    source: .
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - libssl-dev
      - curl
      - ca-certificates
      - xz-utils
    override-build: |
      # Save the old environment
      OLD_LD_PATH=$LD_LIBRARY_PATH
      OLD_PATH=$PATH
      # Reset paths to host compiler tools and clear LD_LIBRARY_PATH to avoid clashes
      export LD_LIBRARY_PATH=""
      
      # Setup self-contained Node.js for the active architecture
      NODE_VER="v20.18.0"
      ARCH=$(uname -m)
      if [ "$ARCH" = "x86_64" ]; then
        NODE_URL="https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-linux-x64.tar.xz"
      elif [ "$ARCH" = "aarch64" ]; then
        NODE_URL="https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-linux-arm64.tar.xz"
      elif [ "$ARCH" = "armv7l" ]; then
        NODE_URL="https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-linux-armv7l.tar.xz"
      elif [ "$ARCH" = "riscv64" ]; then
        NODE_URL="https://unofficial-builds.nodejs.org/download/release/$NODE_VER/node-$NODE_VER-linux-riscv64.tar.xz"
      else
        NODE_URL="https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-linux-$ARCH.tar.xz"
      fi
      
      echo "Downloading Node.js from $NODE_URL"
      mkdir -p build-deps/node
      curl -sSfL "$NODE_URL" | tar -xJ --strip-components=1 -C build-deps/node
      
      # Setup self-contained Rust/rustup toolchain
      export RUSTUP_HOME="$PWD/build-deps/rustup"
      export CARGO_HOME="$PWD/build-deps/cargo"
      echo "Installing Rustup..."
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
      
      # Set PATH with our newly installed tools
      export PATH="$PWD/build-deps/node/bin:$CARGO_HOME/bin:/usr/bin:/bin:/usr/local/bin:$OLD_PATH"
      
      npm install
      # Load your actual signing private key from the host, or generate a dummy key if missing
      if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
        if [ -f "/home/pawel/.tauri/redline.key" ]; then
          export TAURI_SIGNING_PRIVATE_KEY="$(cat /home/pawel/.tauri/redline.key)"
        else
          echo "WARNING: TAURI_SIGNING_PRIVATE_KEY is not set, and ~/.tauri/redline.key is not found. Generating a dummy key for the build..." >&2
          mkdir -p build-deps
          CI=true npm run tauri signer generate -- -w build-deps/dummy.key
          export TAURI_SIGNING_PRIVATE_KEY="$(cat build-deps/dummy.key)"
        fi
      fi
      # Default password to empty string to prevent interactive password prompt hangs
      if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
        export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
      fi
      # Clean any old bundle artifacts to avoid glob issues during extraction
      rm -rf src-tauri/target/release/bundle/deb
      npm run tauri build -- --bundles deb
      # Restore paths
      export PATH=$OLD_PATH
      export LD_LIBRARY_PATH=$OLD_LD_PATH
      dpkg -x src-tauri/target/release/bundle/deb/*.deb $SNAPCRAFT_PART_INSTALL/
      # Copy icon to snap meta folder so snapcraft linter and desktop launcher find it
      mkdir -p $SNAPCRAFT_PART_INSTALL/meta/gui
      cp src-tauri/icons/icon.png $SNAPCRAFT_PART_INSTALL/meta/gui/redline.png
