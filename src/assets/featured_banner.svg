<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 640" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#05080f" />
    </linearGradient>

    <!-- Squircle Gradient -->
    <linearGradient id="squircle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Neon Red Gradient -->
    <linearGradient id="neon-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4b72" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <!-- Neon Cyan Gradient -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Radial Glows -->
    <radialGradient id="red-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>

    <!-- Drafting Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>
    <pattern id="subgrid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#334155" stroke-width="0.2" stroke-opacity="0.15" />
    </pattern>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background slate -->
  <rect width="1920" height="640" fill="url(#bg-grad)" />

  <!-- Grid patterns -->
  <rect width="1920" height="640" fill="url(#subgrid)" />
  <rect width="1920" height="640" fill="url(#grid)" />

  <!-- Ambient Glows -->
  <circle cx="280" cy="320" r="450" fill="url(#red-glow)" />
  <circle cx="1500" cy="320" r="500" fill="url(#cyan-glow)" />

  <!-- BRAND SECTOR (Left/Center) -->
  <g transform="translate(140, 160)" filter="url(#shadow)">
    <!-- Squircle base -->
    <rect width="320" height="320" rx="72" ry="72" fill="url(#squircle-grad)" stroke="#475569" stroke-width="2" />
    
    <!-- Outer blueprint technical guides -->
    <rect x="25" y="25" width="270" height="270" rx="48" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.4" />
    
    <!-- Vertical Glow Stem (The Redline) -->
    <line x1="120" y1="55" x2="120" y2="265" stroke="#f43f5e" stroke-width="8" stroke-linecap="round" filter="url(#neon-glow)" />
    
    <!-- Rest of the letter R vector outline -->
    <path d="M 120 55 C 190 55, 230 85, 230 135 C 230 185, 190 210, 120 210 M 165 210 L 225 265" 
          fill="none" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Vector Anchor Nodes (Cyan points) -->
    <circle cx="120" cy="55" r="7" fill="#06b6d4" stroke="#ffffff" stroke-width="2" />
    <circle cx="230" cy="135" r="7" fill="#06b6d4" stroke="#ffffff" stroke-width="2" />
    <circle cx="120" cy="210" r="7" fill="#06b6d4" stroke="#ffffff" stroke-width="2" />
    <circle cx="225" cy="265" r="7" fill="#06b6d4" stroke="#ffffff" stroke-width="2" />

    <!-- Dimension Label bounds -->
    <line x1="25" y1="305" x2="295" y2="305" stroke="#f43f5e" stroke-width="1.5" stroke-opacity="0.8" />
    <line x1="25" y1="300" x2="25" y2="310" stroke="#f43f5e" stroke-width="1.5" stroke-opacity="0.8" />
    <line x1="295" y1="300" x2="295" y2="310" stroke="#f43f5e" stroke-width="1.5" stroke-opacity="0.8" />
    <rect x="125" y="293" width="70" height="22" rx="4" fill="#0f172a" />
    <text x="160" y="309" fill="#f43f5e" font-family="'Courier New', monospace" font-size="13" font-weight="bold" text-anchor="middle">320 px</text>
  </g>

  <!-- Typography (Center) -->
  <g transform="translate(540, 310)">
    <text x="0" y="0" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="900" letter-spacing="-2">Redline</text>
    <text x="5" y="52" fill="#38bdf8" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" letter-spacing="8">LIGHTWEIGHT IMAGE ANNOTATION</text>
    <text x="5" y="90" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400">Ultra-fast desktop screenshot markups &amp; vector shapes.</text>
  </g>

  <!-- INTERACTIVE APP VIEW REPRESENTATION (Right Sector) -->
  <g transform="translate(1120, 80)" filter="url(#shadow)">
    <!-- Fake Window Frame -->
    <rect width="640" height="480" rx="16" ry="16" fill="#0f172a" stroke="#334155" stroke-width="2.5" />
    
    <!-- Window Titlebar -->
    <rect width="640" height="48" rx="16" ry="16" fill="#1e293b" />
    <rect y="32" width="640" height="16" fill="#1e293b" />
    <line x1="0" y1="48" x2="640" y2="48" stroke="#334155" stroke-width="1" />
    
    <!-- Fake Window Controls -->
    <circle cx="28" cy="24" r="7" fill="#ef4444" />
    <circle cx="50" cy="24" r="7" fill="#f59e0b" />
    <circle cx="72" cy="24" r="7" fill="#10b981" />
    <text x="320" y="30" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">screenshot_01.png</text>

    <!-- Canvas Inner Panel -->
    <rect x="16" y="64" width="608" height="400" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" />
    
    <!-- Mock UI Image Mockup inside Canvas -->
    <g transform="translate(48, 96)">
      <!-- Mock web dashboard frame -->
      <rect width="544" height="336" rx="6" fill="#334155" opacity="0.4" />
      <rect x="16" y="16" width="512" height="48" rx="4" fill="#475569" opacity="0.6" />
      
      <!-- Side panel representation -->
      <rect x="16" y="80" width="128" height="240" rx="4" fill="#475569" opacity="0.6" />
      
      <!-- Content grid blocks -->
      <rect x="160" y="80" width="368" height="100" rx="4" fill="#475569" opacity="0.6" />
      <rect x="160" y="196" width="176" height="124" rx="4" fill="#475569" opacity="0.6" />
      <rect x="352" y="196" width="176" height="124" rx="4" fill="#475569" opacity="0.6" />

      <!-- VECTOR ANNOTATIONS OVERLAY -->
      <!-- Highlight Marker -->
      <rect x="176" y="96" width="140" height="24" rx="3" fill="#38bdf8" fill-opacity="0.35" stroke="#38bdf8" stroke-width="1.5" />
      
      <!-- Bounding Box Annotation (Cyan) -->
      <rect x="152" y="72" width="384" height="116" rx="4" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#neon-glow)" />
      
      <!-- Bounding box resize handles -->
      <rect x="149" y="69" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />
      <rect x="341" y="69" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />
      <rect x="533" y="69" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />
      <rect x="149" y="127" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />
      <rect x="533" y="127" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />
      <rect x="149" y="185" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />
      <rect x="341" y="185" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />
      <rect x="533" y="185" width="6" height="6" fill="#ffffff" stroke="#0891b2" stroke-width="1.5" />

      <!-- Circle Bounding Target -->
      <circle cx="80" cy="200" r="32" fill="none" stroke="#ff4b72" stroke-width="3" filter="url(#neon-glow)" />
      
      <!-- Arrow Pointing to Side Panel -->
      <path d="M 230 260 L 152 220" fill="none" stroke="#ff4b72" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)" />
      
      <!-- Text shape annotation -->
      <text x="160" y="55" fill="#f43f5e" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">Check alignment here!</text>
      
      <!-- Dimension guides -->
      <line x1="160" y1="160" x2="528" y2="160" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="3 3" />
      <line x1="160" y1="154" x2="160" y2="166" stroke="#f43f5e" stroke-width="1.5" />
      <line x1="528" y1="154" x2="528" y2="166" stroke="#f43f5e" stroke-width="1.5" />
      <rect x="315" y="148" width="60" height="20" rx="4" fill="#0f172a" stroke="#f43f5e" stroke-width="1" />
      <text x="345" y="163" fill="#f43f5e" font-family="'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle">368 px</text>

      <!-- Precision cursor node -->
      <g transform="translate(533, 185)">
        <path d="M 0 0 L 15 15 L 8 17 L 17 28 L 12 30 L 3 19 L 0 23 Z" fill="#ffffff" stroke="#000000" stroke-width="1" />
      </g>
    </g>
  </g>
</svg>
