name: redline
base: core22
version: '0.1.2'
title: Redline
summary: A high-performance, lightweight image annotation & redlining tool.
description: |
  Redline is a native, ultra-lightweight desktop image annotation utility
  designed for designers, developers, and QA reviewers to mark up screenshots,
  draw dimensions, add highlights, and edit text shapes.
grade: stable
confinement: strict
license: MIT
contact: https://github.com/jarrodek/redline/issues
issues: https://github.com/jarrodek/redline/issues
source-code: https://github.com/jarrodek/redline
website: https://github.com/jarrodek/redline

layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/webkit2gtk-4.1

apps:
  redline:
    command: usr/bin/redline
    desktop: usr/share/applications/Redline.desktop
    extensions: [gnome]

parts:
  build-app:
    plugin: dump
    source: .
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - libssl-dev
    override-build: |
      # Save the old environment
      OLD_LD_PATH=$LD_LIBRARY_PATH
      OLD_PATH=$PATH
      # Reset paths to host compiler tools and clear LD_LIBRARY_PATH to avoid clashes
      export LD_LIBRARY_PATH=""
      export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"
      rustup default stable
      npm install
      # Load your actual signing private key from the host
      if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
        if [ -f "/home/pawel/.tauri/redline.key" ]; then
          export TAURI_SIGNING_PRIVATE_KEY="$(cat /home/pawel/.tauri/redline.key)"
        else
          echo "ERROR: TAURI_SIGNING_PRIVATE_KEY is not set, and ~/.tauri/redline.key is not found." >&2
          echo "The private key is required to sign tauri updates correctly." >&2
          exit 1
        fi
      fi
      # Default password to empty string to prevent interactive password prompt hangs
      if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
        export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
      fi
      # Clean any old bundle artifacts to avoid glob issues during extraction
      rm -rf src-tauri/target/release/bundle/deb
      npm run tauri build -- --bundles deb
      # Restore paths
      export PATH=$OLD_PATH
      export LD_LIBRARY_PATH=$OLD_LD_PATH
      dpkg -x src-tauri/target/release/bundle/deb/*.deb $SNAPCRAFT_PART_INSTALL/
      # Copy icon to snap meta folder so snapcraft linter and desktop launcher find it
      mkdir -p $SNAPCRAFT_PART_INSTALL/meta/gui
      cp src-tauri/icons/icon.png $SNAPCRAFT_PART_INSTALL/meta/gui/redline.png
