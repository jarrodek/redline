<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f212a" />
      <stop offset="100%" stop-color="#0f1014" />
    </linearGradient>

    <!-- Glowing Redline Laser Gradient -->
    <linearGradient id="redline-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="100%" stop-color="#ff0033" />
    </linearGradient>

    <!-- Semi-transparent R-Loop Gradient -->
    <linearGradient id="loop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.12)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.03)" />
    </linearGradient>

    <!-- Blur Filter for Neon Glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle Base Container -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="4" />

  <!-- Blueprint Drafting Grid -->
  <g stroke="rgba(255, 255, 255, 0.02)" stroke-width="1.5">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Vector Construction Guidelines -->
  <!-- Diagonal leg blueprint guide -->
  <line x1="240" y1="250" x2="330" y2="397" stroke="rgba(0, 210, 255, 0.25)" stroke-width="2" stroke-dasharray="4,4" />
  <!-- Horizontal loop alignment guide -->
  <line x1="155" y1="250" x2="390" y2="250" stroke="rgba(0, 210, 255, 0.25)" stroke-width="1.5" stroke-dasharray="2,2" />

  <!-- The R-Loop and Leg Shapes -->
  <!-- R Loop -->
  <path d="M 155 130 H 275 C 325 130, 325 250, 275 250 H 155 Z" fill="url(#loop-grad)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="4" />
  <!-- R Leg -->
  <path d="M 230 250 L 320 385" stroke="rgba(255, 255, 255, 0.25)" stroke-width="16" stroke-linecap="round" />

  <!-- Glowing Redline Laser (The R's Stem) -->
  <rect x="135" y="115" width="40" height="282" rx="20" fill="url(#redline-grad)" filter="url(#glow)" />
  <!-- Neon Inner Core -->
  <rect x="147" y="127" width="16" height="258" rx="8" fill="#ffffff" opacity="0.65" />

  <!-- Redline Dimension Annotations (Design Specs Style) -->
  <!-- Height Dimension: Vertical -->
  <g stroke="#ff3366" stroke-width="1.5" opacity="0.85">
    <!-- Top extension -->
    <line x1="125" y1="115" x2="85" y2="115" />
    <!-- Bottom extension -->
    <line x1="125" y1="397" x2="85" y2="397" />
    <!-- Vertical Dimension Line -->
    <line x1="95" y1="115" x2="95" y2="397" />
    <!-- Slash ticks -->
    <line x1="90" y1="110" x2="100" y2="120" />
    <line x1="90" y1="392" x2="100" y2="402" />
  </g>
  <!-- Height Text -->
  <text x="-256" y="80" transform="rotate(-90)" fill="#ff3366" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">282 px</text>

  <!-- Width Dimension: Horizontal -->
  <g stroke="#ff3366" stroke-width="1.5" opacity="0.85">
    <!-- Left extension -->
    <line x1="155" y1="105" x2="155" y2="65" />
    <!-- Right extension -->
    <line x1="330" y1="105" x2="330" y2="65" />
    <!-- Horizontal Dimension Line -->
    <line x1="155" y1="75" x2="330" y2="75" />
    <!-- Slash ticks -->
    <line x1="150" y1="70" x2="160" y2="80" />
    <line x1="325" y1="70" x2="335" y2="80" />
  </g>
  <!-- Width Text -->
  <text x="242" y="67" fill="#ff3366" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">175 px</text>

  <!-- Vector Anchor Nodes (Cyan) -->
  <!-- Loop Anchor -->
  <rect x="269" y="124" width="12" height="12" fill="#00d2ff" stroke="#ffffff" stroke-width="2" rx="2" />
  <!-- Leg Anchor -->
  <rect x="314" y="379" width="12" height="12" fill="#00d2ff" stroke="#ffffff" stroke-width="2" rx="2" />

  <!-- Designer Cursor Arrow -->
  <g transform="translate(15, 0)">
    <!-- Cursor Path -->
    <path d="M 314 379 L 324 409 L 332 401 L 344 413 L 349 408 L 337 396 L 345 388 Z" fill="#ffffff" stroke="#0f1014" stroke-width="2.5" stroke-linejoin="round" />
  </g>
</svg>
